version: '3.8'

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "8080:8080"
    command: >
      sh -c "mkdir -p /freqtrade/user_data/data/binance && 
             mkdir -p /freqtrade/user_data/logs &&
             webserver --config /freqtrade/user_data/config.json"

  config-api:
    build:
      context: .
      dockerfile: config_api.Dockerfile
    restart: unless-stopped
    container_name: freqtrade-config-api
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "8081:8081"
    environment:
      - CONFIG_PATH=/freqtrade/user_data/config.json
